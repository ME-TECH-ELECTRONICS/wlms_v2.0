<!DOCTYPE html>
<html>

<head>
    <title>Payment Request Demo</title>
</head>

<body>

    <h2>Buy Water Controller</h2>
    <button id="payBtn">Pay ₹499</button>

    <script>
        document.getElementById("payBtn").addEventListener("click", async () => {

            if (!window.PaymentRequest) {
                alert("Payment API not supported");
                return;
            }

            const supportedMethods = [
                {
                    supportedMethods: "https://google.com/pay",
                    data: {
                        environment: "TEST",
                        apiVersion: 2,
                        apiVersionMinor: 0,
                        merchantInfo: {
                            merchantName: "Demo Merchant"
                        },
                        allowedPaymentMethods: [{
                            type: "CARD",
                            parameters: {
                                allowedAuthMethods: ["PAN_ONLY", "CRYPTOGRAM_3DS"],
                                allowedCardNetworks: ["VISA", "MASTERCARD"]
                            },
                            tokenizationSpecification: {
                                type: "PAYMENT_GATEWAY",
                                parameters: {
                                    gateway: "example",
                                    gatewayMerchantId: "exampleMerchantId"
                                }
                            }
                        }]
                    }
                }
            ];

            const details = {
                total: {
                    label: "Water Controller Device",
                    amount: { currency: "INR", value: "499.00" }
                }
            };

            try {
                const request = new PaymentRequest(supportedMethods, details);
                const response = await request.show();

                console.log(response);

                await response.complete("success");
                alert("Payment flow triggered");

            } catch (err) {
                console.error(err);
                alert("Payment failed / not configured");
            }
        });
    </script>

</body>

</html>
