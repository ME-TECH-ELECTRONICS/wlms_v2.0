<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #020617;
            --bg3: #70707258;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --primary: #8b5cf6;
            --primary-fade: #5a3d9e;
            --secondary: #22d3ee;
            --secondary-fade: #1e9bbd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.25), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(34, 211, 238, 0.2), transparent 40%),
                linear-gradient(135deg, var(--bg1), var(--bg2));
            color: var(--text);
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 30px;
            border-radius: 20px;
            background: var(--card);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .title {
            text-align: center;
            background: linear-gradient(90deg, #a78bfa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-weight: 600;
            transition: .3s;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .field {
            position: relative;
            margin-bottom: 18px;
        }

        .field input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            outline: none;
        }

        .field label {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
            pointer-events: none;
            transition: .25s;
            background: transparent;
        }

        .field input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(198, 245, 252, 0.15);
        }

        .field input:focus+label,
        .field input:not(:placeholder-shown)+label {
            top: -8px;
            font-size: 11px;
            background: var(--bg3);
            padding: 0 6px;
            color: #67e8f9;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }
        .fade{
            background: linear-gradient(135deg, var(--primary-fade), var(--secondary-fade)) !important;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.4);
        }

        .link {
            display: block;
            text-align: right;
            margin: 10px 0;
            font-size: 13px;
            color: #67e8f9;
            cursor: pointer;
        }

        .msg {
            display: none;
            padding: 10px;
            margin-bottom: 25px;
            border-radius: 10px;
            font-size: 13px;
        }

        .success {
            background: #2fa35d;
        }

        .error {
            background: #c22323;
        }

        .pass-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 12px;
            color: #94a3b8;
        }

        .cf-turnstile {
            margin: 20px 0 20px 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 class="title">Account Access</h2>

        <div class="tabs">
            <button class="tab active" data="loginForm">Login</button>
            <button class="tab" data="registerForm">Register</button>
        </div>

        <!-- LOGIN -->
        <form class="panel active" id="loginForm">
            <div class="msg" id="loginMsg"></div>

            <div class="field">
                <input type="email" name="login-email" id="loginEmail" placeholder=" " required>
                <label>Email</label>
            </div>

            <div class="field">
                <input type="password" name="login-password" id="loginPass" placeholder=" " required>
                <label>Password</label>
                <span class="pass-toggle" data="loginPass">Show</span>
            </div>

            <span class="link switch" data="forgotForm">Forgot Password?</span>
            <!-- <div class="cf-turnstile" data-sitekey="0x4AAAAAAC_SlmlB65j2jMo5" data-size="flexible"></div> -->
            <button class="btn" id="loginBtn" type="submit">Login</button>
        </form>

        <!-- REGISTER -->
        <form class="panel" id="register">
            <div class="msg" id="regMsg"></div>

            <div class="field">
                <input type="text" name="fullname" id="regName" placeholder=" " required>
                <label>Full Name</label>
            </div>

            <div class="field">
                <input type="email" name="reg-email" id="regEmail" placeholder=" " required>
                <label>Email</label>
            </div>

            <div class="field">
                <input type="password" name="reg-password" id="regPass1" placeholder=" " required>
                <label>Password</label>
                <span class="pass-toggle" data="regPass1">Show</span>
            </div>

            <div class="field">
                <input type="password" name="reg-password-confirm" id="regPass2" placeholder=" " required>
                <label>Confirm Password</label>
                <span class="pass-toggle" data="regPass2">Show</span>
            </div>
            <!-- <div class="cf-turnstile" data-sitekey="0x4AAAAAAC_SlmlB65j2jMo5" data-size="flexible"></div> -->
            <button class="btn" id="regBtn" type="submit">Register</button>
        </form>

        <!-- FORGOT -->
        <form class="panel" id="forgotForm">
            <div class="msg" id="forgotMsg"></div>

            <div class="field">
                <input type="email" name="forget-email" id="forgotEmail" placeholder=" " required>
                <label>Email</label>
            </div>
            <!-- <div class="cf-turnstile" data-sitekey="0x4AAAAAAC_SlmlB65j2jMo5" data-size="flexible"></div> -->
            <button class="btn" id="forgotBtn" type="submit">Send Reset Link</button>
        </form>

    </div>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="./jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {
            $('input[type=email]').on('input', function (e) {
                let value = $(this).val();
                value = value.replace(/[^a-zA-Z0-9@._+-]/g, '');
                if (value.length > 64) {
                    value = value.substring(0, 64);
                }
                let parts = value.split('@');
                if (parts.length > 2) {
                    value = parts[0] + '@' + parts.slice(1).join('').replace(/@/g, '');
                }
                $(this).val(value);
            });

            $('input[type=password]').on('input', function () {
                let value = $(this).val();
                value = value.replace(/\s/g, '');
                if (value.length > 20) {
                    value = value.substring(0, 20);
                }
                $(this).val(value);
            });

            $('input[name="fullname"]').on('input', function () {
                let value = $(this).val();
                value = value.replace(/[^a-zA-Z ]/g, '');
                value = value.replace(/\s+/g, ' ');
                value = value.replace(/^\s/, '');
                $(this).val(value);
            });
            function showMsg(id, msg, type) {
                $(id).removeClass("error success").addClass(type).text(msg).show();
                setTimeout(() => $(id).fadeOut(), 3000);
            }

            $('#loginForm').on('submit', function (e) {
                e.preventDefault();

                let email = $('#loginEmail').val().trim();
                let password = $('#loginPass').val();
                let captcha = $('#loginForm input[name="cf-turnstile-response"]').val();

                if (!email || !password) {
                    return showMsg('#loginMsg', 'All fields required', 'error');
                }

                // if (!captcha) {
                //     return showMsg('#loginMsg', 'Complete captcha', 'error');
                // }
                
                $.ajax({
                    url: "/api/login.php",
                    method: "POST",
                    contentType: "application/json",
                    dataType: "json",
                    data: JSON.stringify({ email, password, captcha }),

                    beforeSend: () => $("#loginBtn").prop("disabled", true).addClass('fade').html('<i class="fa-solid fa-circle-notch fa-spin fa-xl"></i>'),

                    success: function (res) {
                        showMsg('#loginMsg', res.message, res.success ? 'success' : 'error');
                        localStorage.setItem('token', res.token);
                        if (res.success) {
                            setTimeout(() => location.href = "/dashboard", 1000);
                        }

                        turnstile.reset();
                    },

                    error: () => showMsg('#loginMsg', 'Server error', 'error')
                });
            });

            $('#register').on('submit', function (e) {
                e.preventDefault();

                let name = $('input[name="fullname"]').val().trim();
                let email = $('input[name="reg-email"]').val().trim();
                let pass1 = $('#regPass1').val();
                let pass2 = $('#regPass2').val();
                let captcha = $('#register input[name="cf-turnstile-response"]').val();

                if (!name || !email || !pass1 || !pass2) {
                    return showMsg('#regMsg', 'All fields required', 'error');
                }

                if (pass1 !== pass2) {
                    return showMsg('#regMsg', 'Passwords do not match', 'error');
                }

                if (!captcha) {
                    return showMsg('#regMsg', 'Complete captcha', 'error');
                }

                $.ajax({
                    url: "/api/register.php",
                    method: "POST",
                    contentType: "application/json",
                    dataType: "json",
                    data: JSON.stringify({ name, email, password: pass1, captcha }),

                    beforeSend: () => $("#regBtn").prop("disabled", true).addClass('fade').html('<i class="fa-solid fa-circle-notch fa-spin fa-xl"></i>'),

                    success: function (res) {
                        showMsg('#regMsg', res.message, res.success ? 'success' : 'error');
                        turnstile.reset();
                    },

                    error: () => showMsg('#regMsg', 'Server error', 'error')
                });
            });

            $('#forgotForm').on('submit', function (e) {
                e.preventDefault();

                let email = $('#forgotForm input[name="forget-email"]').val().trim();
                let captcha = $('#forgotForm input[name="cf-turnstile-response"]').val();
                if (!email) {
                    return showMsg('#forgotMsg', 'Enter email', 'error');
                }

                if (!captcha) {
                    return showMsg('#forgotMsg', 'Complete captcha', 'error');
                }

                $.ajax({
                    url: "/api/forgot.php",
                    method: "POST",
                    contentType: "application/json",
                    dataType: "json",
                    data: JSON.stringify({ email, captcha }),

                    beforeSend: () => $("#forgotBtn").prop("disabled", true).addClass('fade').html('<i class="fa-solid fa-circle-notch fa-spin fa-xl"></i>'),

                    success: function (res) {
                        showMsg('#forgotMsg', res.message, res.success ? 'success' : 'error');
                        turnstile.reset();
                    },

                    error: () => showMsg('#forgotMsg', 'Server error', 'error')
                });
            });

            function showPanel(id) {
                $(".panel").removeClass("active");
                $("#" + id).addClass("active");

                $(".tab").removeClass("active");
                $('.tab[data="' + id + '"]').addClass("active");

                $(".msg").hide();
            }

            $(".tab, .switch").click(function () {
                showPanel($(this).attr("data"));
            });

            $(".pass-toggle").click(function () {
                let id = $(this).attr("data");
                let input = $("#" + id);

                if (input.attr("type") === "password") {
                    input.attr("type", "text");
                    $(this).text("Hide");
                } else {
                    input.attr("type", "password");
                    $(this).text("Show");
                }
            });

            $("#loginBtn").click(function () {
                $("#loginMsg").removeClass("error").addClass("success")
                    .text("Login submitted").show();
            });

            $("#regBtn").click(function () {
                let p1 = $("#regPass1").val();
                let p2 = $("#regPass2").val();

                if (p1 !== p2) {
                    $("#regMsg").removeClass("success").addClass("error")
                        .text("Passwords do not match").show();
                    return;
                }

                $("#regMsg").removeClass("error").addClass("success")
                    .text("Registered successfully").show();
            });

            // $("#forgotBtn").click(function () {
            //     $("#forgotMsg").removeClass("error").addClass("success")
            //         .text("Reset link sent").show();
            // });

        });
    </script>

</body>

</html>
