<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verified</title>
    <link rel="stylesheet" href="/css/verify.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container verify-box">
        <div class="icon" id="verifyIcon">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
        </div>
        <div class="title" id="verifyTitle">Verifying Account...</div>
        <div class="desc" id="verifyDesc">
            Please wait while we verify your email.
        </div>
        <a href="/login" class="btn" id="verifyBtn" style="display:none; text-decoration:none;">
            Go to Login
        </a>
    </div>

    <script src="/js/jquery-3.7.1.min.js"></script>
    <script src="/js/verify.js" defer></script>
</body>
</html>
